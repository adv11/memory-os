services:
  postgres:
    image: postgres:16-alpine
    container_name: memoryos-postgres
    environment:
      POSTGRES_DB: memoryos
      POSTGRES_USER: memoryos
      POSTGRES_PASSWORD: memoryos
    ports:
      - "5432:5432"
    volumes:
      - memoryos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryos -d memoryos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  memoryos_postgres_data:

