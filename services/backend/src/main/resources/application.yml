spring:
  application:
    name: memory-os-backend
  datasource:
    url: ${MEMORYOS_DATABASE_URL:jdbc:postgresql://localhost:5432/memoryos}
    username: ${MEMORYOS_DATABASE_USERNAME:memoryos}
    password: ${MEMORYOS_DATABASE_PASSWORD:memoryos}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email

server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${MEMORYOS_COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

memoryos:
  cors:
    allowed-origins: ${MEMORYOS_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  web:
    success-url: ${MEMORYOS_WEB_SUCCESS_URL:http://localhost:3000/dashboard}
    logout-success-url: ${MEMORYOS_WEB_LOGOUT_SUCCESS_URL:http://localhost:3000}

